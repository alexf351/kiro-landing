name: IndexNow ping

# Notifies Bing (+ Yandex, Seznam, Naver) that pages changed, so they re-crawl
# without waiting. Runs automatically when content changes on master, and can
# be run on demand from the Actions tab. Google and Brave don't use IndexNow.

on:
  push:
    branches: [master]
    paths:
      - '**.html'
      - 'sitemap.xml'
      - 'blog-sitemap.xml'
  workflow_dispatch: {}

# Avoid overlapping pings if several pushes land close together.
concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # IndexNow validates by fetching the key file from the live site, so wait
      # for the Vercel deploy to publish before pinging (up to ~5 min).
      - name: Wait for the deploy to publish the key file
        run: |
          KEY=b5b04a1f5ff05c02d330e53b5362b5db
          for i in $(seq 1 20); do
            if curl -fsS "https://tryiro.com/${KEY}.txt" | grep -q "${KEY}"; then
              echo "Key file is live."; exit 0
            fi
            echo "Waiting for deploy... attempt ${i}/20"; sleep 15
          done
          echo "::warning::Key file not confirmed live after ~5 min; pinging anyway."

      - name: Submit URLs to IndexNow
        run: node growth/indexnow-ping.mjs

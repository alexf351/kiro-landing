<body>
  <main>
    <img src="/assets/kiro-app-icon-256.png" alt="Iro AI"/>
    <h1>Opening Iro</h1>
    <p>Sending you to the App Store.</p>
    <a class="btn" id="downloadLink" href="https://apps.apple.com/app/id6759628066?utm_source=tiktok&utm_medium=bio&utm_campaign=profile">Download on the App Store</a>
    <p class="hint">If nothing happens, tap the button.</p>
  </main>
  <script>
    (function(){
      const params=new URLSearchParams(window.location.search);
      const source=params.get('source')||params.get('utm_source')||'tiktok';
      const medium=params.get('medium')||params.get('utm_medium')||'bio';
      const campaign=params.get('campaign')||params.get('utm_campaign')||'profile';
      const appStoreUrl='https://apps.apple.com/app/id6759628066?utm_source='+encodeURIComponent(source)+'&utm_medium='+encodeURIComponent(medium)+'&utm_campaign='+encodeURIComponent(campaign);
      const link=document.getElementById('downloadLink');
      if(link)link.href=appStoreUrl;
      const props={
        source,
        medium,
        campaign,
        utm_source:source,
        utm_medium:medium,
        utm_campaign:campaign,
        '$utm_source':source,
        '$utm_medium':medium,
        '$utm_campaign':campaign,
        landing_path:window.location.pathname,
        visible_url:window.location.origin+window.location.pathname,
        destination:'app_store',
        referrer:document.referrer||null,
        user_agent:navigator.userAgent||null
      };
      function go(){window.location.href=appStoreUrl;}
      if(window.posthog){
        posthog.register({utm_source:source,utm_medium:medium,utm_campaign:campaign});
        posthog.capture('$pageview',props);
        posthog.capture('download_link_opened',props);
        posthog.capture('tiktok_bio_link_clicked',props);
      }
      setTimeout(go,650);
    })();
  </script>
</body>

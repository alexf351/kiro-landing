<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E1A;--surface:#141B2D;--surface-border:#1E2740;
  --text:#FFFFFF;--text2:#8B95B0;--text3:#4A5370;
  --cyan:#00E5FF;--gold:#FFD700;--error:#FF4757;--success:#2ECC71;
}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  overflow-x:hidden;line-height:1.6;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;position:relative
}
body::before{
  content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);
  width:800px;height:800px;
  background:radial-gradient(ellipse at center,rgba(0,229,255,.06) 0%,transparent 65%);
  pointer-events:none;z-index:0
}

.quiz-wrap{max-width:600px;width:100%;text-align:center;position:relative;z-index:1}

/* NAV */
.quiz-nav{
  position:fixed;top:0;left:0;right:0;padding:14px 24px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  background:rgba(10,14,26,0.75);border-bottom:1px solid rgba(30,39,64,0.4)
}
.quiz-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;transition:color .2s}
.quiz-nav a:hover{color:var(--text)}
.quiz-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;color:var(--text) !important;text-decoration:none;letter-spacing:-0.5px}
.quiz-logo img{width:34px;height:34px;border-radius:9px}

/* INTRO */
.quiz-intro .quiz-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.18);
  padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;color:var(--cyan);
  margin-bottom:28px;letter-spacing:.4px
}
.quiz-intro-mascot{
  width:140px;height:140px;object-fit:contain;margin:0 auto 24px;display:block;
  filter:drop-shadow(0 0 24px rgba(0,229,255,.18));
  animation:floatBounce 3s ease-in-out infinite
}
@keyframes floatBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.quiz-intro h1{
  font-size:clamp(32px,5vw,48px);font-weight:900;line-height:1.08;
  letter-spacing:-1.5px;margin-bottom:16px
}
.quiz-intro h1 span{
  background:linear-gradient(90deg,var(--cyan),#00B4D8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.quiz-intro p{font-size:17px;color:var(--text2);max-width:440px;margin:0 auto 36px;line-height:1.6}
.quiz-intro .quiz-meta{font-size:13px;color:var(--text3);margin-top:16px}

/* BUTTONS */
.btn-primary{
  background:var(--cyan);color:var(--bg);border:none;padding:16px 36px;border-radius:13px;
  font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;cursor:pointer;text-decoration:none;
  transition:all .25s;display:inline-flex;align-items:center;gap:8px;
  box-shadow:0 0 40px rgba(0,229,255,.2)
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 60px rgba(0,229,255,.35)}
.btn-secondary{
  background:transparent;color:var(--text3);border:1px solid var(--surface-border);
  padding:12px 24px;border-radius:13px;font-family:'Outfit',sans-serif;font-weight:600;
  font-size:14px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px
}
.btn-secondary:hover{border-color:var(--text3);color:var(--text2)}

/* PROGRESS */
.quiz-progress{margin-bottom:32px}
.quiz-progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.quiz-progress-label{font-size:13px;color:var(--text3);font-weight:600;letter-spacing:.5px}
.quiz-progress-hint{font-size:12px;color:var(--cyan);font-weight:600;opacity:0;transition:opacity .3s}
.quiz-progress-hint.visible{opacity:1}
.quiz-progress-bar{height:4px;background:var(--surface);border-radius:4px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--cyan);border-radius:4px;transition:width .4s ease}

/* QUESTION */
.quiz-question{animation:fadeIn .3s ease}
.quiz-q-number{
  display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--text3);margin-bottom:14px
}
.quiz-q-difficulty{
  display:inline-block;margin-left:8px;padding:2px 8px;border-radius:6px;
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase
}
.diff-easy{background:rgba(46,204,113,.1);color:var(--success)}
.diff-medium{background:rgba(255,215,0,.1);color:var(--gold)}
.diff-hard{background:rgba(255,71,87,.1);color:var(--error)}
.quiz-question h2{font-size:clamp(20px,3.5vw,26px);font-weight:700;line-height:1.35;margin-bottom:28px;letter-spacing:-.3px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{
  width:100%;padding:16px 20px;border-radius:14px;
  background:var(--surface);border:1px solid var(--surface-border);
  color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px
}
.quiz-option:hover:not(.disabled){border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.04)}
.quiz-option.correct{
  border-color:var(--success);background:rgba(46,204,113,.12);color:var(--success);
  animation:correctPop .5s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 28px rgba(46,204,113,.3),inset 0 0 12px rgba(46,204,113,.06)
}
@keyframes correctPop{0%{transform:scale(1)}30%{transform:scale(1.06)}60%{transform:scale(.98)}100%{transform:scale(1)}}
.quiz-option.correct .quiz-option-letter{
  animation:letterSpin .5s ease;
  background:var(--success);color:#fff
}
@keyframes letterSpin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.3)}100%{transform:rotate(360deg) scale(1)}}
.correct-streak{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:48px;font-weight:900;color:var(--success);
  pointer-events:none;z-index:300;
  animation:streakPop .8s ease forwards;opacity:0
}
@keyframes streakPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}50%{opacity:1;transform:translate(-50%,-60%) scale(1)}100%{opacity:0;transform:translate(-50%,-80%) scale(.8)}}
.quiz-option.wrong{border-color:var(--error);background:rgba(255,71,87,.1);color:var(--error)}
.quiz-option.reveal-correct{border-color:var(--success);background:rgba(46,204,113,.06)}
.quiz-option.disabled{cursor:default;opacity:.7}
.quiz-option-letter{
  width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--text3);flex-shrink:0
}
.quiz-option.correct .quiz-option-letter{background:rgba(46,204,113,.2);color:var(--success)}
.quiz-option.wrong .quiz-option-letter{background:rgba(255,71,87,.2);color:var(--error)}

/* RESULTS */
.quiz-results{animation:fadeIn .5s ease}
.results-mascot{
  width:220px;height:220px;object-fit:contain;margin-bottom:28px;
  filter:drop-shadow(0 0 20px rgba(0,229,255,.2));
  animation:resultsPop .6s cubic-bezier(.34,1.56,.64,1)
}
@keyframes resultsPop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.quiz-results .score-big{
  font-family:'JetBrains Mono',monospace;font-size:clamp(56px,10vw,80px);
  font-weight:700;letter-spacing:-3px;margin-bottom:4px;
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:scoreReveal .5s ease .2s both,scoreShimmer 3s ease infinite .7s
}
.score-big.shimmer-bronze{background-image:linear-gradient(90deg,#CD7F32,#fff,#CD7F32,#fff,#CD7F32)}
.score-big.shimmer-silver{background-image:linear-gradient(90deg,#C0C0C0,#fff,#C0C0C0,#fff,#C0C0C0)}
.score-big.shimmer-gold{background-image:linear-gradient(90deg,#FFD700,#fff,#FFD700,#fff,#FFD700)}
.score-big.shimmer-platinum{background-image:linear-gradient(90deg,#E5E4E2,#fff,#E5E4E2,#fff,#E5E4E2)}
.score-big.shimmer-diamond{background-image:linear-gradient(90deg,#B9F2FF,#fff,#00E5FF,#fff,#B9F2FF)}
@keyframes scoreReveal{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes scoreShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.quiz-results .score-label{font-size:16px;color:var(--text2);margin-bottom:24px;font-weight:600}
.quiz-results .rank-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:100px;font-size:15px;font-weight:700;
  letter-spacing:.5px;margin-bottom:16px;
  animation:fadeIn .4s ease .4s both
}
.rank-bronze{background:rgba(205,127,50,.12);color:#CD7F32;border:1px solid rgba(205,127,50,.25)}
.rank-silver{background:rgba(192,192,192,.12);color:#C0C0C0;border:1px solid rgba(192,192,192,.25)}
.rank-gold{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.rank-platinum{background:rgba(229,228,226,.1);color:#E5E4E2;border:1px solid rgba(229,228,226,.2)}
.rank-diamond{background:rgba(185,242,255,.1);color:#B9F2FF;border:1px solid rgba(185,242,255,.2)}
.quiz-results .message{font-size:16px;color:var(--text2);max-width:400px;margin:0 auto 32px;line-height:1.6;animation:fadeIn .4s ease .5s both}
.quiz-results .btn-row{display:flex;flex-direction:column;gap:10px;align-items:center;animation:fadeIn .4s ease .6s both}
.quiz-results .retake{
  margin-top:20px;font-size:14px;color:var(--text3);
  text-decoration:none;cursor:pointer;background:none;border:none;
  font-family:'Outfit',sans-serif;transition:color .2s
}
.quiz-results .retake:hover{color:var(--text2)}
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:12px;background:var(--surface);
  border:1px solid var(--surface-border);color:var(--text);
  font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200
}
.toast.show{opacity:1}

/* WRONG ANSWER NUDGE */
.quiz-nudge{
  margin-top:12px;padding:10px 16px;border-radius:10px;
  background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.1);
  font-size:13px;color:var(--cyan);text-align:center;
  animation:fadeIn .25s ease
}
/* CHALLENGE INTRO */
.challenge-bar{
  background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);
  border-radius:12px;padding:14px 20px;margin-bottom:28px;
  font-size:14px;color:var(--cyan);font-weight:600;
  animation:fadeIn .4s ease
}
.challenge-bar span{color:var(--text);font-weight:800}
/* WEAKNESS TAG */
.results-weakness{
  font-size:13px;color:var(--text3);margin-bottom:24px;
  padding:8px 16px;border-radius:8px;background:var(--surface);
  display:inline-block;animation:fadeIn .4s ease .45s both
}
.results-weakness strong{color:var(--text2)}

/* EMAIL CAPTURE */
.email-capture{margin-top:20px;animation:fadeIn .4s ease .7s both}
.email-capture-label{font-size:14px;color:var(--text2);margin-bottom:10px}
.email-form{display:flex;gap:8px;justify-content:center}
.email-form input[type="email"]{
  flex:1;padding:12px 16px;border-radius:11px;border:1px solid var(--surface-border);
  background:var(--surface);color:var(--text);font-family:'Outfit',sans-serif;
  font-size:14px;outline:none;transition:border-color .2s;min-width:0
}
.email-form input[type="email"]:focus{border-color:var(--cyan)}
.email-form input[type="email"]::placeholder{color:var(--text3)}
.email-form button{
  padding:12px 20px;border-radius:11px;border:none;background:var(--cyan);color:var(--bg);
  font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer;
  transition:all .2s;white-space:nowrap
}
.email-form button:hover{box-shadow:0 0 20px rgba(0,229,255,.3)}
.email-form-success{font-size:14px;color:var(--success);font-weight:600;display:none;margin-top:8px}
.cta-micro{font-size:12px;color:var(--text3);margin-top:8px}
.cta-platform{font-size:13px;color:var(--text3);margin-top:10px}
.cta-platform .platform-soon{color:var(--cyan);font-weight:600}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
  body{padding:16px}
  .quiz-option{padding:14px 16px;font-size:14px}
  .quiz-results .btn-row .btn-primary,.quiz-results .btn-row .btn-secondary{width:100%;justify-content:center}
  .quiz-intro-mascot{width:110px;height:110px}
}
</style>

<script>
const allQuizzes=[
[
{q:"What\u2019s the biggest risk of asking AI to summarize a long document?",opts:["It might leave out or misrepresent important key details","It takes too long to process and significantly slows down your workflow","It will refuse to summarize if the document is too large to handle","It costs significantly more tokens than most other common tasks"],ans:0,diff:"easy",topic:"AI Fundamentals",nudge:"Kiro\u2019s AI Fundamentals path covers how AI handles text."},
{q:"What\u2019s the difference between AI \u2018training\u2019 and \u2018inference\u2019?",opts:["They\u2019re the same thing, just different vendor terminology for the process","Training is when AI learns from data; inference is when it generates outputs","Training is significantly faster than inference because it uses much less data","Inference is when AI collects new training data directly from its active users"],ans:1,diff:"easy",topic:"AI Fundamentals",nudge:"This is covered in Kiro\u2019s AI Fundamentals lessons."},
{q:"You ask AI to write a product description and it sounds generic. What should you try first?",opts:["Switch to a different AI model that specializes in marketing content creation","Make the prompt shorter so the AI isn\u2019t overwhelmed by too many details","Add specific details about your audience, tone, and what makes the product unique","Ask it to \u2018be more creative\u2019 and try again with the exact same prompt input"],ans:2,diff:"easy",topic:"Prompt Engineering",nudge:"Kiro\u2019s Prompt Engineering path teaches exactly this."},
{q:"What does \u2018context window\u2019 mean?",opts:["The screen size and layout settings of the AI application user interface","A browser extension that adds AI capabilities to every website you visit","The time limit before a chat session automatically expires on the server","The amount of text an AI can process in a single conversation at once"],ans:3,diff:"medium",topic:"AI Tools",nudge:"Kiro\u2019s AI Tools path breaks down how models actually work."},
{q:"An AI model gives you a confident answer with a source citation. What should you assume?",opts:["It\u2019s accurate because it took the extra time to cite a real source","The citation itself may be completely fabricated and needs verification","The source is definitely real but the specific claim might be slightly off","Nothing \u2014 AI models always cite their sources correctly by design"],ans:1,diff:"medium",topic:"AI Fundamentals",nudge:"Spotting hallucinations is a core skill in Kiro\u2019s AI Fundamentals path."},
{q:"Why would a company use RAG instead of fine-tuning for a customer support bot?",opts:["Fine-tuning doesn\u2019t work at all for any customer support use cases","RAG doesn\u2019t require any data whatsoever, so it\u2019s much easier to set up","RAG lets the bot pull from up-to-date docs without retraining the model","RAG is always cheaper regardless of the specific use case or company scale"],ans:2,diff:"medium",topic:"AI Automation",nudge:"Kiro\u2019s AI Automation path covers real business AI decisions."},
{q:"What does \u2018temperature\u2019 control in an AI model?",opts:["The total processing speed of each individual API request to the server","How many external sources it references when generating each answer","The maximum length and total word count of the generated response","How creative vs. predictable the output is for any given prompt input"],ans:3,diff:"medium",topic:"AI Tools",nudge:"Kiro\u2019s AI Tools path teaches model settings like this."},
{q:"Your company wants to use AI to answer customer questions using internal docs. Best approach?",opts:["Build a RAG system that retrieves relevant info from your knowledge base","Copy-paste all your docs into every single chat session with the AI model","Train your own large language model from scratch using all company data","Fine-tune GPT-4 from scratch using your entire company database directly"],ans:0,diff:"hard",topic:"AI Automation",nudge:"This is a Delegate or DIY scenario \u2014 Kiro trains you on these."},
{q:"You use AI to draft a contract clause. It reads perfectly. What\u2019s the most dangerous assumption?",opts:["That the formatting won\u2019t match your existing contract template style","That it took too long to generate compared to writing it yourself manually","That it used too many tokens and will significantly increase your API costs","That because it sounds professional, it\u2019s actually legally accurate"],ans:3,diff:"hard",topic:"AI Business",nudge:"Kiro\u2019s AI Business path teaches you to catch exactly this."},
{q:"When is fine-tuning a model better than using a detailed prompt?",opts:["When you want the AI to browse the internet for real-time current data","When you need consistent behavior across thousands of similar tasks","Always \u2014 fine-tuning is superior to prompting in every possible scenario","When the model is running too slowly and you need to increase its speed"],ans:1,diff:"hard",topic:"Prompt Engineering",nudge:"Kiro\u2019s Prompt Engineering path covers when to prompt vs. fine-tune."}
],

const letters=['A','B','C','D'];
const diffLabels={easy:'Easy',medium:'Medium',hard:'Hard'};
let quizIndex=0;
let questions=allQuizzes[0];
let current=0,score=0,streak=0;
const missed=[];
const streakWords=['Nice!','Correct!','On fire!','Unstoppable!','Genius!'];

// #4 — Challenge URL: check for ?score= param
(function(){
  const params=new URLSearchParams(window.location.search);
  const friendScore=params.get('score');
  if(friendScore!==null){
    const intro=document.getElementById('quizIntro');
    const badge=intro.querySelector('.quiz-badge');
    const challenge=document.createElement('div');
    challenge.className='challenge-bar';
    challenge.innerHTML=`Your friend scored <span>${friendScore}/10</span>. Can you beat them?`;
    intro.insertBefore(challenge,badge);
  }
})();

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('quizIntro').style.display='none';
  document.getElementById('quizGame').style.display='block';
  if(window.posthog)posthog.capture('quiz_started');
  showQuestion();
});

function showQuestion(){
  const q=questions[current];
  const quizLabel=allQuizzes.length>1?` \u00b7 Quiz ${quizIndex+1}`:'';
  document.getElementById('progressLabel').textContent=`Question ${current+1} of 10${quizLabel}`;
  document.getElementById('progressFill').style.width=((current+1)*10)+'%';

  const hint=document.getElementById('progressHint');
  if(current>=6){
    hint.textContent=current>=8?'Last one!':'Almost there!';
    hint.classList.add('visible');
  } else {
    hint.classList.remove('visible');
  }

  const area=document.getElementById('questionArea');
  area.innerHTML=`<div class="quiz-question">
    <div class="quiz-q-number">Q${current+1}<span class="quiz-q-difficulty diff-${q.diff}">${diffLabels[q.diff]}</span></div>
    <h2>${q.q}</h2>
    <div class="quiz-options">${
    q.opts.map((o,i)=>`<button class="quiz-option" data-idx="${i}"><span class="quiz-option-letter">${letters[i]}</span>${o}</button>`).join('')
  }</div></div>`;
  area.querySelectorAll('.quiz-option').forEach(btn=>{
    btn.addEventListener('click',()=>handleAnswer(parseInt(btn.dataset.idx)));
  });
}

function handleAnswer(idx){
  const q=questions[current];
  const btns=document.querySelectorAll('.quiz-option');
  btns.forEach(b=>{b.classList.add('disabled');b.style.pointerEvents='none'});
  const correct=idx===q.ans;
  if(correct){
    score++;streak++;
    btns[idx].classList.add('correct');
    const pop=document.createElement('div');
    pop.className='correct-streak';
    pop.textContent=streakWords[Math.min(streak-1,streakWords.length-1)];
    document.body.appendChild(pop);
    setTimeout(()=>pop.remove(),900);
  } else {
    streak=0;
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('reveal-correct');
    missed.push(q.topic);
    // #2 — Show nudge on wrong answer
    const opts=document.querySelector('.quiz-options');
    const nudge=document.createElement('div');
    nudge.className='quiz-nudge';
    nudge.textContent=q.nudge;
    opts.after(nudge);
  }
  if(window.posthog)posthog.capture('quiz_answer',{question:current+1,correct,topic:q.topic,difficulty:q.diff});
  setTimeout(()=>{
    current++;
    if(current<10){showQuestion()}else{showResults()}
  },correct?1200:2200);
}

function showResults(){
  document.getElementById('quizGame').style.display='none';
  const r=document.getElementById('quizResults');
  r.style.display='block';

  let rank,rankClass,msg,mascot;
  if(score<=3){rank='Bronze';rankClass='rank-bronze';msg='You\u2019re early in your AI journey \u2014 and that\u2019s the best time to start. Kiro can get you to Platinum in a week.';mascot='bronze-kiro.png'}
  else if(score<=5){rank='Silver';rankClass='rank-silver';msg='You know more than most people. A few focused days with Kiro and you\u2019ll be dangerous.';mascot='silver-kiro.png'}
  else if(score<=7){rank='Gold';rankClass='rank-gold';msg='Solid foundation. You\u2019re ahead of the curve \u2014 Kiro will turn that into real fluency.';mascot='gold-kiro.png'}
  else if(score<=9){rank='Platinum';rankClass='rank-platinum';msg='You\u2019re in the top tier. Kiro Pro\u2019s advanced paths will sharpen your edge even further.';mascot='platinum-kiro.png'}
  else{rank='Diamond';rankClass='rank-diamond';msg='Perfect score. You might already be an AI expert \u2014 but Kiro\u2019s Prompt Lab and duels will still challenge you.';mascot='diamond-kiro.png'}

  // #3 — Find weakest topic
  let weaknessHtml='';
  if(missed.length>0){
    const counts={};
    missed.forEach(t=>{counts[t]=(counts[t]||0)+1});
    const weakest=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
    weaknessHtml=`<div class="results-weakness">Your gap: <strong>${weakest}</strong> \u2014 Kiro has a full path for that.</div>`;
  }

  r.innerHTML=`<div class="quiz-results">
    <picture><source srcset="assets/${mascot.replace('.png','.webp')}" type="image/webp"/><img alt="${rank} Kiro" class="results-mascot" decoding="async" src="assets/${mascot}"/></picture>
    <div class="score-big shimmer-${rank.toLowerCase()}">${score}/10</div>
    <div class="score-label">Your AI Fluency Score</div>
    <div class="rank-badge ${rankClass}">${rank}</div>
    ${weaknessHtml}
    <p class="message">${msg}</p>
    <div class="btn-row">
      <a class="btn-primary" href="https://apps.apple.com/app/id6759628066?utm_source=website&utm_medium=cta&utm_campaign=quiz_results">Download Kiro &mdash; It's Free</a>
      <p class="cta-micro">Cancel anytime</p>
      <p class="cta-platform">Available on iOS · <span class="platform-soon">Android coming soon</span></p>
      <button class="btn-secondary" id="shareBtn">Challenge a Friend</button>
    </div>
    <div class="email-capture">
      <p class="email-capture-label">Get your personalized AI learning plan</p>
      <form class="email-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input type="email" name="email" placeholder="Your email" required/>
        <input type="hidden" name="source" value="quiz-results"/>
        <input type="hidden" name="score" value="${score}"/>
        <input type="hidden" name="rank" value="${rank}"/>
        <button type="submit">Send Plan</button>
      </form>
      <p class="email-form-success" id="quizEmailSuccess">Check your inbox!</p>
    </div>
    <button class="retake" id="retakeBtn">Retake Quiz</button>
  </div>`;

  // #1 — PostHog quiz completed event
  if(window.posthog)posthog.capture('quiz_completed',{score,rank,missed_topics:missed});

  // #4 — Share with challenge URL
  document.getElementById('shareBtn').addEventListener('click',()=>{
    const url=`https://www.trykiro.app/quiz.html?score=${score}`;
    const text=`I scored ${score}/10 on the Kiro AI IQ Test. Can you beat me? ${url}`;
    navigator.clipboard.writeText(text).then(()=>{
      if(window.posthog)posthog.capture('quiz_shared',{score,rank});
      const t=document.getElementById('toast');t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    });
  });

  const retakeLabel=quizIndex<allQuizzes.length-1?'Try Quiz '+(quizIndex+2)+' \u2192':'Retake Quiz';
  document.getElementById('retakeBtn').textContent=retakeLabel;

  const emailForm=r.querySelector('.email-form');
  if(emailForm){
    emailForm.addEventListener('submit',function(e){
      e.preventDefault();
      const data=new FormData(emailForm);
      fetch(emailForm.action,{method:'POST',body:data,headers:{'Accept':'application/json'}}).then(res=>{
        if(res.ok){
          emailForm.style.display='none';
          const success=document.getElementById('quizEmailSuccess');
          if(success)success.style.display='block';
          if(window.posthog)posthog.capture('email_captured',{source:'quiz-results',score,rank});
        }
      }).catch(()=>{});
    });
  }

  document.getElementById('retakeBtn').addEventListener('click',()=>{
    quizIndex=(quizIndex+1)%allQuizzes.length;
    questions=allQuizzes[quizIndex];
    current=0;score=0;streak=0;missed.length=0;
    r.style.display='none';
    document.getElementById('quizGame').style.display='block';
    if(window.posthog)posthog.capture('quiz_started',{quiz_number:quizIndex+1});
    showQuestion();
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI IQ Test — How fluent are you? | Kiro</title>
<meta content="Take the Kiro AI IQ Test. 10 questions. Find out where you stand — and how far you could go." name="description"/>
<meta content="#0A0E1A" name="theme-color"/>
<meta property="og:title" content="What's your AI IQ? Take the Kiro Quiz."/>
<meta property="og:description" content="10 questions. 2 minutes. Find out where you stand on AI fluency."/>
<meta property="og:image" content="https://www.trykiro.app/assets/kiro-app-icon-512.png"/>
<meta property="og:url" content="https://www.trykiro.app/quiz.html"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="What's your AI IQ? Take the Kiro Quiz."/>
<meta name="twitter:description" content="10 questions. 2 minutes. Find out where you stand on AI fluency."/>
<meta name="twitter:image" content="https://www.trykiro.app/assets/kiro-app-icon-512.png"/>
<link href="assets/favicon-64.png" rel="icon" type="image/png"/>
<link href="assets/apple-touch-icon.png" rel="apple-touch-icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E1A;--surface:#141B2D;--surface-border:#1E2740;
  --text:#FFFFFF;--text2:#8B95B0;--text3:#4A5370;
  --cyan:#00E5FF;--gold:#FFD700;--error:#FF4757;--success:#2ECC71;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

.quiz-wrap{max-width:600px;width:100%;text-align:center}

/* NAV */
.quiz-nav{position:fixed;top:0;left:0;right:0;padding:16px 24px;z-index:100;display:flex;align-items:center;justify-content:space-between}
.quiz-nav a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;transition:color .2s}
.quiz-nav a:hover{color:var(--text)}
.quiz-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--text);text-decoration:none}

/* INTRO */
.quiz-intro .quiz-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.18);
  padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;color:var(--cyan);
  margin-bottom:28px;letter-spacing:.4px
}
.quiz-intro h1{
  font-size:clamp(32px,5vw,48px);font-weight:900;line-height:1.08;
  letter-spacing:-1.5px;margin-bottom:16px
}
.quiz-intro h1 span{
  background:linear-gradient(90deg,var(--cyan),#00B4D8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.quiz-intro p{font-size:17px;color:var(--text2);max-width:440px;margin:0 auto 36px;line-height:1.6}
.quiz-intro .quiz-meta{font-size:13px;color:var(--text3);margin-top:16px}

/* BUTTONS */
.btn-primary{
  background:var(--cyan);color:var(--bg);border:none;padding:16px 36px;border-radius:13px;
  font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;cursor:pointer;text-decoration:none;
  transition:all .25s;display:inline-flex;align-items:center;gap:8px;
  box-shadow:0 0 40px rgba(0,229,255,.2)
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 60px rgba(0,229,255,.35)}
.btn-secondary{
  background:transparent;color:var(--text2);border:1px solid var(--surface-border);
  padding:14px 28px;border-radius:13px;font-family:'Outfit',sans-serif;font-weight:600;
  font-size:15px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px
}
.btn-secondary:hover{border-color:var(--text3);color:var(--text)}

/* PROGRESS */
.quiz-progress{margin-bottom:32px}
.quiz-progress-label{font-size:13px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-bottom:10px}
.quiz-progress-bar{height:4px;background:var(--surface);border-radius:4px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--cyan);border-radius:4px;transition:width .4s ease}

/* QUESTION */
.quiz-question{animation:fadeIn .3s ease}
.quiz-question h2{font-size:clamp(20px,3.5vw,26px);font-weight:700;line-height:1.35;margin-bottom:28px;letter-spacing:-.3px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{
  width:100%;padding:16px 20px;border-radius:14px;
  background:var(--surface);border:1px solid var(--surface-border);
  color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px
}
.quiz-option:hover:not(.disabled){border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.04)}
.quiz-option.correct{border-color:var(--success);background:rgba(46,204,113,.1);color:var(--success)}
.quiz-option.wrong{border-color:var(--error);background:rgba(255,71,87,.1);color:var(--error)}
.quiz-option.reveal-correct{border-color:var(--success);background:rgba(46,204,113,.06)}
.quiz-option.disabled{cursor:default;opacity:.7}
.quiz-option-letter{
  width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--text3);flex-shrink:0
}
.quiz-option.correct .quiz-option-letter{background:rgba(46,204,113,.2);color:var(--success)}
.quiz-option.wrong .quiz-option-letter{background:rgba(255,71,87,.2);color:var(--error)}

/* RESULTS */
.quiz-results{animation:fadeIn .4s ease}
.quiz-results .score-big{
  font-family:'JetBrains Mono',monospace;font-size:clamp(56px,10vw,80px);
  font-weight:700;letter-spacing:-3px;margin-bottom:4px
}
.quiz-results .score-label{font-size:15px;color:var(--text3);margin-bottom:24px}
.quiz-results .rank-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:100px;font-size:15px;font-weight:700;
  letter-spacing:.5px;margin-bottom:16px
}
.rank-bronze{background:rgba(205,127,50,.12);color:#CD7F32;border:1px solid rgba(205,127,50,.25)}
.rank-silver{background:rgba(192,192,192,.12);color:#C0C0C0;border:1px solid rgba(192,192,192,.25)}
.rank-gold{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.rank-platinum{background:rgba(229,228,226,.1);color:#E5E4E2;border:1px solid rgba(229,228,226,.2)}
.rank-diamond{background:rgba(185,242,255,.1);color:#B9F2FF;border:1px solid rgba(185,242,255,.2)}
.quiz-results .message{font-size:16px;color:var(--text2);max-width:400px;margin:0 auto 32px;line-height:1.6}
.quiz-results .btn-row{display:flex;flex-direction:column;gap:10px;align-items:center}
.quiz-results .retake{
  margin-top:20px;font-size:14px;color:var(--text3);
  text-decoration:none;cursor:pointer;background:none;border:none;
  font-family:'Outfit',sans-serif;transition:color .2s
}
.quiz-results .retake:hover{color:var(--text2)}
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:12px;background:var(--surface);
  border:1px solid var(--surface-border);color:var(--text);
  font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200
}
.toast.show{opacity:1}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
  body{padding:16px}
  .quiz-option{padding:14px 16px;font-size:14px}
  .quiz-results .btn-row .btn-primary,.quiz-results .btn-row .btn-secondary{width:100%;justify-content:center}
}
</style>
<script>

<body>

<nav class="quiz-nav">
<a class="quiz-logo" href="index.html">Kiro</a>
<a href="index.html">&larr; Back to site</a>
</nav>

<div class="quiz-wrap">

<!-- INTRO -->
<div class="quiz-intro" id="quizIntro">
<div class="quiz-badge">🧠 AI IQ Test</div>
<h1>How fluent are you<br/>in <span>AI?</span></h1>
<p>10 questions. 2 minutes. Find out where you stand — and how far you could go.</p>
<button class="btn-primary" id="startBtn">Take the Quiz →</button>
<div class="quiz-meta">No signup required · Free</div>
</div>

<!-- QUIZ -->
<div id="quizGame" style="display:none">
<div class="quiz-progress">
<div class="quiz-progress-label" id="progressLabel">Question 1 of 10</div>
<div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progressFill" style="width:10%"></div></div>
</div>
<div id="questionArea"></div>
</div>

<!-- RESULTS -->
<div id="quizResults" style="display:none"></div>

</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
const questions=[
{q:"What\u2019s the biggest risk of asking AI to summarize a long document?",opts:["It takes too long","It might leave out or misrepresent key details","It will refuse","It costs more tokens"],ans:1},
{q:"What\u2019s the difference between AI \u2018training\u2019 and \u2018inference\u2019?",opts:["Training is when AI learns from data; inference is when it uses that learning to generate outputs","They\u2019re the same thing","Training is faster than inference","Inference only works offline"],ans:0},
{q:"You ask AI to write a product description and it sounds generic. What should you try first?",opts:["Switch to a different AI model","Add specific details about your audience, tone, and what makes the product unique","Make the prompt shorter so the AI isn\u2019t overwhelmed","Ask it to \u2018be more creative\u2019"],ans:1},
{q:"What does 'context window' mean?",opts:["The screen size of the AI app","The amount of text an AI can process in a single conversation","The time limit on a chat session","A browser extension for AI"],ans:1},
{q:"An AI model gives you a confident, well-written answer with a source citation. What should you assume?",opts:["It\u2019s accurate because it cited a source","The source is real but you should verify the claim","The citation itself may be fabricated and needs verification","Nothing \u2014 AI always cites correctly"],ans:2},
{q:"Why would a company use RAG instead of fine-tuning for a customer support bot?",opts:["RAG is always cheaper","RAG lets the bot pull from up-to-date docs without retraining the model","Fine-tuning doesn\u2019t work for customer support","RAG doesn\u2019t require any data"],ans:1},
{q:"What does 'temperature' control in an AI model?",opts:["Processing speed","How creative vs. predictable the output is","The length of the response","How many sources it references"],ans:1},
{q:"Your company wants to use AI to answer customer questions using internal docs. What approach fits best?",opts:["Fine-tune GPT-4 from scratch","Build a RAG system that retrieves from your knowledge base","Copy-paste docs into every chat","Train your own LLM"],ans:1},
{q:"You use AI to draft a contract clause. It reads perfectly. What\u2019s the most dangerous assumption?",opts:["That it took too long to generate","That because it sounds professional, it\u2019s legally accurate","That the formatting won\u2019t match your template","That it used too many tokens"],ans:1},
{q:"When is fine-tuning a model better than using a detailed prompt?",opts:["Always \u2014 fine-tuning is superior to prompting","When you need consistent behavior across thousands of similar tasks","When you want the AI to browse the internet","When the model is too slow"],ans:1}
];

const letters=['A','B','C','D'];
let current=0,score=0;

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('quizIntro').style.display='none';
  document.getElementById('quizGame').style.display='block';
  showQuestion();
});

function showQuestion(){
  const q=questions[current];
  document.getElementById('progressLabel').textContent=`Question ${current+1} of 10`;
  document.getElementById('progressFill').style.width=((current+1)*10)+'%';
  const area=document.getElementById('questionArea');
  area.innerHTML=`<div class="quiz-question"><h2>${q.q}</h2><div class="quiz-options">${
    q.opts.map((o,i)=>`<button class="quiz-option" data-idx="${i}"><span class="quiz-option-letter">${letters[i]}</span>${o}</button>`).join('')
  }</div></div>`;
  area.querySelectorAll('.quiz-option').forEach(btn=>{
    btn.addEventListener('click',()=>handleAnswer(parseInt(btn.dataset.idx)));
  });
}

function handleAnswer(idx){
  const q=questions[current];
  const btns=document.querySelectorAll('.quiz-option');
  btns.forEach(b=>{b.classList.add('disabled');b.style.pointerEvents='none'});
  if(idx===q.ans){
    score++;
    btns[idx].classList.add('correct');
  } else {
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('reveal-correct');
  }
  setTimeout(()=>{
    current++;
    if(current<10){showQuestion()}else{showResults()}
  },1500);
}

function showResults(){
  document.getElementById('quizGame').style.display='none';
  const r=document.getElementById('quizResults');
  r.style.display='block';

  let rank,rankClass,msg;
  if(score<=3){rank='Bronze';rankClass='rank-bronze';msg='Most people score here. Kiro can get you to Platinum in a week.'}
  else if(score<=5){rank='Silver';rankClass='rank-silver';msg='Most people score here. Kiro can get you to Platinum in a week.'}
  else if(score<=7){rank='Gold';rankClass='rank-gold';msg="You've got a foundation. Kiro will sharpen it into a real skill."}
  else if(score<=9){rank='Platinum';rankClass='rank-platinum';msg='Impressive. Kiro Pro will push you even further.'}
  else{rank='Diamond';rankClass='rank-diamond';msg='Impressive. Kiro Pro will push you even further.'}

  r.innerHTML=`<div class="quiz-results">
    <div class="score-big">${score}/10</div>
    <div class="score-label">Your AI Fluency Score</div>
    <div class="rank-badge ${rankClass}">${rank}</div>
    <p class="message">${msg}</p>
    <div class="btn-row">
      <a class="btn-primary" href="https://apps.apple.com/app/id6759628066">Download Kiro &mdash; It's Free</a>
      <button class="btn-secondary" id="shareBtn">📋 Share Your Score</button>
    </div>
    <button class="retake" id="retakeBtn">Retake Quiz</button>
  </div>`;

  document.getElementById('shareBtn').addEventListener('click',()=>{
    const text=`I scored ${score}/10 on the Kiro AI IQ Test. What's your AI fluency? trykiro.app/quiz`;
    navigator.clipboard.writeText(text).then(()=>{
      const t=document.getElementById('toast');t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    });
  });

  document.getElementById('retakeBtn').addEventListener('click',()=>{
    current=0;score=0;
    r.style.display='none';
    document.getElementById('quizIntro').style.display='block';
  });
}
</script>
</body>
</html>
